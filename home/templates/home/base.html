{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-slate-800 text-white hidden md:block">
            <div class="p-4 text-2xl font-bold border-b border-slate-700">
                My App
            </div>

            <nav class="mt-4">
                <a href="" class="block px-4 py-3 hover:bg-slate-700">
                    Dashboard
                </a>

                <a href="" class="block px-4 py-3 hover:bg-slate-700">
                    About
                </a>

                <a href="#" class="block px-4 py-3 hover:bg-slate-700">
                    Setting
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">

            <!-- Navbar -->
            <header class="bg-white shadow">
                <div class="flex items-center justify-between px-6 py-4">
                    <h1 class="text-xl font-semibold text-gray-800">
                        {% block page_title %}Dashboard{% endblock %}
                    </h1>

                    <div class="flex items-center gap-4">
                        <span class="text-gray-600">
                            {{ request.user }}
                        </span>

                        <img
                            src="https://ui-avatars.com/api/?name={{ request.user.username }}"
                            class="w-10 h-10 rounded-full"
                            alt="Avatar">
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 p-6 overflow-y-auto">
                {% block content %}
                {% endblock %}
            </main>

        </div>

    </div>

</body>
</html>
