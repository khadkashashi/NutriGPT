<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriGPT - Meals</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #2d6a4f; }
        .meal-card { background: white; padding: 15px 20px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .meal-card h3 { margin: 0; color: #333; }
        .meal-card p { margin: 4px 0 0; color: #888; font-size: 14px; }
        .actions a { margin-left: 10px; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 13px; }
        .btn-edit { background: #f0a500; color: white; }
        .btn-delete { background: #e63946; color: white; }
        .btn-add { display: inline-block; margin: 20px 0; background: #2d6a4f; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
        .empty { text-align: center; color: #aaa; margin-top: 60px; }
    </style>
</head>
<body>
    <h1>🥗 NutriGPT Meals</h1>
    <a href="/meal/create/" class="btn-add">+ Add Meal</a>

    {% if meal %}
        {% for m in meal %}
        <div class="meal-card">
            <div>
                <h3>{{ m.name }}</h3>
                <p>{{ m.meal_type }} · {{ m.prepare_time }} mins</p>
            </div>
            <div class="actions">
                <a href="/meal/update/{{ m.pk }}/" class="btn-edit">Edit</a>
                <a href="/meal/delete/{{ m.pk }}/" class="btn-delete">Delete</a>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="empty">
            <p>No meals yet. Add your first meal!</p>
        </div>
    {% endif %}
</body>
</html>
